name: Daily Market Briefing

on:
  schedule:
    - cron: '0 1 * * *'   # 매일 01:00 UTC = 10:00 KST
  workflow_dispatch:        # GitHub 웹에서 수동 실행 버튼

jobs:
  send-briefing:
    runs-on: ubuntu-latest
    permissions:
      contents: write       # docs/data.json 커밋·푸시 권한

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run briefing
        env:
          KAKAO_REST_API_KEY:  ${{ secrets.KAKAO_REST_API_KEY }}
          KAKAO_REFRESH_TOKEN: ${{ secrets.KAKAO_REFRESH_TOKEN }}
          ANTHROPIC_API_KEY:   ${{ secrets.ANTHROPIC_API_KEY }}
        run: python -m src.main

      - name: Push dashboard data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data.json
          git diff --staged --quiet || git commit -m "data: $(date +%Y-%m-%d)"
          git push
